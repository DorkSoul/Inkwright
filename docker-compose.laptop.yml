services:
  inkwright:
    image: ghcr.io/dorksoul/inkwright:perchar
    container_name: inkwright
    depends_on:
      - ollama
    ports:
      - "8084:8084"
    volumes:
      - C:/Repos/Inkwright/config:/config
      - C:/Repos/Inkwright/books:/books
      - C:/Repos/Inkwright/audiobooks:/audiobooks
    environment:
      - BOOKS_DIR=/books
      - AUDIOBOOKS_DIR=/audiobooks
      - CONFIG_DIR=/config
      - PORT=8084
      - OLLAMA_HOST=http://ollama:11434
      - LLM_PROVIDER=ollama_9b
      # - LLM_PROVIDER=claude
      # - CLAUDE_API_KEY=sk-ant-...
      # - SECRET_KEY=change-me
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: inkwright-ollama
    volumes:
      - C:/Repos/Inkwright/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

